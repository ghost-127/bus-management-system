{% extends "base.html" %}
{% block title %}Bus Timings — BusManag{% endblock %}
{% block page_title %}⏰ My Bus Schedule{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="card-title">⏰ Weekly Schedule</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <select id="dayFilter" class="form-control" style="width:auto;padding:6px 12px;font-size:12px;"
                onchange="renderTimings()">
                <option value="">All Days</option>
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
                <option>Saturday</option>
                <option>Sunday</option>
            </select>
        </div>
    </div>
    <div class="card-body" style="padding:0;">
        <div id="timingList">
            <div style="text-align:center;padding:28px;">
                <div class="spinner" style="margin:auto;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let allTimings = [];
    const DAY_COLORS = { Monday: '#6366f1', Tuesday: '#06b6d4', Wednesday: '#10b981', Thursday: '#f59e0b', Friday: '#8b5cf6', Saturday: '#ec4899', Sunday: '#ef4444' };

    function renderTimings() {
        const day = document.getElementById('dayFilter').value;
        const filtered = day ? allTimings.filter(t => t.day_of_week === day) : allTimings;
        const el = document.getElementById('timingList');
        if (!filtered.length) {
            el.innerHTML = '<div class="empty-state" style="padding:28px;"><span class="empty-state-icon">⏰</span>No timings found</div>';
            return;
        }
        // Group by day
        const byDay = {};
        filtered.forEach(t => { if (!byDay[t.day_of_week]) byDay[t.day_of_week] = []; byDay[t.day_of_week].push(t); });
        el.innerHTML = Object.entries(byDay).map(([d, ts]) => `
    <div>
      <div style="padding:8px 16px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);
           display:flex;align-items:center;gap:8px;">
        <span style="width:10px;height:10px;border-radius:50%;background:${DAY_COLORS[d] || '#6366f1'};flex-shrink:0;display:inline-block;"></span>
        <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">${d}</span>
      </div>
      ${ts.map(t => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);">
        <span style="font-weight:700;font-size:14px;color:var(--text-primary);">🚌 ${t.bus_no}</span>
        <div style="display:flex;gap:12px;align-items:center;">
          <span style="font-size:13px;font-weight:700;color:#34d399;">🟢 ${t.departure_time}</span>
          <span style="color:var(--text-muted);">→</span>
          <span style="font-size:13px;font-weight:700;color:#f87171;">🔴 ${t.arrival_time}</span>
        </div>
        ${t.notes ? `<span style="font-size:11px;color:var(--text-muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">📝 ${t.notes}</span>` : ''}
      </div>`).join('')}
    </div>`).join('');
    }

    async function load() {
        const timings = await apiGet('/api/timings');
        {% if bus %}
        allTimings = timings.filter(t => t.bus_no === '{{ bus.bus_no }}');
        {% else %}
        allTimings = timings;
        {% endif %}
        // Auto-select today
        const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const today = DAYS[new Date().getDay()];
        const sel = document.getElementById('dayFilter');
        if ([...sel.options].some(o => o.value === today)) sel.value = today;
        renderTimings();
    }
    load();
</script>
{% endblock %}
