{% extends "base.html" %}
{% block title %}Buses — BusManag{% endblock %}
{% block page_title %}🚌 Available Buses{% endblock %}

{% block content %}


<div class="card mb-6">
    <div class="card-header">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" placeholder="Search buses, routes, drivers…" id="searchInput" oninput="filterBuses()">
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <select class="form-control" id="statusFilter" onchange="filterBuses()" style="max-width:140px;">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>
    </div>
</div>

<div class="bus-grid" id="busGrid">
    <div class="loading-overlay" style="grid-column:1/-1;">
        <div class="spinner"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let allBuses = [];

    async function loadBuses() {
        allBuses = await apiGet('/api/buses');
        renderBuses(allBuses);
    }

    function filterBuses() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        let filtered = allBuses.filter(b => {
            const match = (b.bus_no + b.route_name + b.driver_name).toLowerCase().includes(q);
            const statusMatch = !status || b.status === status;
            return match && statusMatch;
        });
        renderBuses(filtered);
    }

    function renderBuses(buses) {
        const grid = document.getElementById('busGrid');
        if (buses.length === 0) {
            grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><span class="empty-state-icon">🚌</span><p>No buses found</p></div>';
            return;
        }
        grid.innerHTML = buses.map(b => {
            let liveBadge = '';
            if (b.current_status === 'In Transit') {
                liveBadge = '<span class="badge" style="background:rgba(52,211,153,0.1);color:#34d399;">🟢 In Transit</span>';
            } else if (b.current_status === 'Breakdown') {
                liveBadge = '<span class="badge" style="background:rgba(239,68,68,0.1);color:#f87171;">🚨 Breakdown</span>';
            } else if (b.current_status === 'Completed') {
                liveBadge = '<span class="badge" style="background:rgba(99,102,241,0.1);color:#818cf8;">🏁 Completed</span>';
            } else {
                liveBadge = '<span class="badge" style="background:rgba(156,163,175,0.1);color:#9ca3af;">⚪ Not Started</span>';
            }

            return `
        <div class="bus-card" onclick="window.location='/student/route/${b.id}'">
            <div class="bus-card-header">
                <div>
                    <div class="bus-number">${b.bus_no}</div>
                    ${b.bus_type === 'event'
                    ? '<span class="badge badge-purple" style="margin-top:4px;display:inline-block;">Event Bus</span>'
                    : ''}
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                    ${b.status === 'active'
                    ? '<span class="badge badge-success">● Active</span>'
                    : '<span class="badge badge-danger">● Inactive</span>'}
                    ${liveBadge}
                </div>
            </div>
            <div class="bus-route">🗺️ ${b.route_name}</div>
            <div class="bus-meta">
                <div class="bus-meta-item">👤 ${b.driver_name}</div>
                <div class="bus-meta-item">💺 ${b.capacity} seats</div>
            </div>
            ${b.current_status === 'In Transit' ? `<div style="font-size:12px;font-weight:600;color:#34d399;margin-top:8px;">📍 Location: At Stop #${b.current_stop_id || '?'}</div>` : ''}
            <div style="margin-top:16px;">
                <span class="btn btn-secondary btn-sm" style="width:100%;justify-content:center;">View Route & Live Stops →</span>
            </div>
        </div>`}).join('');
    }

    loadBuses();
</script>
{% endblock %}
