{% extends "base.html" %}
{% block title %}Change Password — College Bus Management{% endblock %}
{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="bento" style="display: flex; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 480px; padding: 24px;">
        <div class="card-header" style="margin-bottom: 24px; border-bottom: none; padding-bottom: 0;">
            <div class="card-title">🔑 Update Your Password</div>
        </div>

        <div id="msgBox" style="display:none; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#f87171; font-size:13px; padding:14px; border-radius:10px; margin-bottom:16px; text-align:center;"></div>
        <div id="successBox" style="display:none; background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2); color:#34d399; font-size:13px; padding:14px; border-radius:10px; margin-bottom:16px; text-align:center;"></div>

        <div id="formSection" style="display: flex; flex-direction: column; gap: 16px;">
            <div class="login-input-group" style="position: relative;">
                <span style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-muted); pointer-events: none;">🔒</span>
                <input type="password" id="currentPass" class="login-input" placeholder="Current password" style="width: 100%; box-sizing: border-box; background: var(--bg-body); border: 1px solid var(--border); padding: 14px 16px 14px 44px; border-radius: 12px; color: var(--text-primary); font-size: 15px; transition: all 0.3s ease;">
            </div>
            <div class="login-input-group" style="position: relative;">
                <span style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-muted); pointer-events: none;">🔒</span>
                <input type="password" id="newPass" class="login-input" placeholder="New password (min. 6 characters)" style="width: 100%; box-sizing: border-box; background: var(--bg-body); border: 1px solid var(--border); padding: 14px 16px 14px 44px; border-radius: 12px; color: var(--text-primary); font-size: 15px; transition: all 0.3s ease;">
            </div>
            <div class="login-input-group" style="position: relative;">
                <span style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-muted); pointer-events: none;">🔒</span>
                <input type="password" id="confirmPass" class="login-input" placeholder="Confirm new password" style="width: 100%; box-sizing: border-box; background: var(--bg-body); border: 1px solid var(--border); padding: 14px 16px 14px 44px; border-radius: 12px; color: var(--text-primary); font-size: 15px; transition: all 0.3s ease;">
            </div>
            <button class="btn btn-primary" id="updateBtn" onclick="doUpdate()" style="width: 100%; justify-content: center; padding: 14px; font-size: 15px; margin-top: 8px;">Update Password</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function doUpdate() {
        const btn = document.getElementById('updateBtn');
        const msgBox = document.getElementById('msgBox');
        const successBox = document.getElementById('successBox');
        
        const current_password = document.getElementById('currentPass').value;
        const new_password = document.getElementById('newPass').value;
        const confirm_password = document.getElementById('confirmPass').value;

        msgBox.style.display = 'none';
        successBox.style.display = 'none';
        
        if (!current_password) { msgBox.textContent = 'Current password is required.'; msgBox.style.display = 'block'; return; }
        if (new_password.length < 6) { msgBox.textContent = 'New password must be at least 6 characters.'; msgBox.style.display = 'block'; return; }
        if (new_password !== confirm_password) { msgBox.textContent = 'New passwords do not match.'; msgBox.style.display = 'block'; return; }

        btn.textContent = 'Updating…'; btn.disabled = true;
        try {
            const res = await fetch('/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ current_password, new_password })
            });
            const data = await res.json();
            
            if (res.ok && data.success) {
                document.getElementById('formSection').style.display = 'none';
                successBox.innerHTML = `${data.message}`;
                successBox.style.display = 'block';
            } else {
                msgBox.textContent = data.message || 'Error updating password.';
                msgBox.style.display = 'block';
                btn.textContent = 'Update Password'; btn.disabled = false;
            }
        } catch {
            msgBox.textContent = 'Server error. Please try again.';
            msgBox.style.display = 'block';
            btn.textContent = 'Update Password'; btn.disabled = false;
        }
    }
    
    document.addEventListener('keydown', e => { 
        if (e.key === 'Enter') doUpdate(); 
    });
</script>
{% endblock %}
