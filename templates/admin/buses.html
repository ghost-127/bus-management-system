{% extends "base.html" %}
{% block title %}Manage Buses — BusManag{% endblock %}
{% block page_title %}🚌 Bus Management{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" placeholder="Search buses…" id="searchInput"
                oninput="filterTable('searchInput','busTbody')">
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">➕ Add Bus</button>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Bus No.</th>
                    <th>Capacity</th>
                    <th>Driver</th>
                    <th>Route</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="busTbody">
                <tr>
                    <td colspan="7" style="text-align:center;padding:30px;">
                        <div class="spinner" style="margin:auto;"></div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-backdrop" id="busModal">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">Add Bus</h3>
            <button class="modal-close" onclick="closeModal('busModal')">✕</button>
        </div>
        <input type="hidden" id="editId">
        <div class="form-group">
            <label class="form-label">Bus Number *</label>
            <input class="form-control" id="fBusNo" placeholder="e.g. KL-01-BUS-101">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Capacity</label>
                <input class="form-control" type="number" id="fCapacity" placeholder="40" min="1">
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-control" id="fStatus">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Assign Driver</label>
            <select class="form-control" id="fDriver">
                <option value="">Unassigned</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('busModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveBus()">Save Bus</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let buses = [], drivers = [];

    async function load() {
        [buses, drivers] = await Promise.all([apiGet('/api/buses'), apiGet('/api/drivers')]);
        renderDriverOptions();
        renderTable();
    }

    function renderDriverOptions(selected = '') {
        const sel = document.getElementById('fDriver');
        sel.innerHTML = '<option value="">Unassigned</option>' +
            drivers.map(d => `<option value="${d.id}" ${d.id == selected ? 'selected' : ''}>${d.name}</option>`).join('');
    }

    function renderTable() {
        const tbody = document.getElementById('busTbody');
        if (!buses.length) {
            tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><span class="empty-state-icon">🚌</span>No buses added yet</div></td></tr>';
            return;
        }
        tbody.innerHTML = buses.map((b, i) => `
        <tr>
            <td>${i + 1}</td>
            <td><strong>${b.bus_no}</strong></td>
            <td>💺 ${b.capacity}</td>
            <td>${b.driver_name}</td>
            <td>${b.route_name}</td>
            <td>${statusBadge(b.status)}</td>
            <td>
                <div style="display:flex;gap:6px;">
                    <button class="btn btn-secondary btn-sm btn-icon" onclick="openEditModal(${b.id})" title="Edit">✏️</button>
                    <button class="btn btn-danger btn-sm btn-icon" onclick="deleteBus(${b.id},'${b.bus_no}')" title="Delete">🗑️</button>
                </div>
            </td>
        </tr>`).join('');
    }

    function openAddModal() {
        document.getElementById('modalTitle').textContent = 'Add New Bus';
        document.getElementById('editId').value = '';
        document.getElementById('fBusNo').value = '';
        document.getElementById('fCapacity').value = '40';
        document.getElementById('fStatus').value = 'active';
        renderDriverOptions();
        openModal('busModal');
    }

    function openEditModal(id) {
        const b = buses.find(x => x.id === id);
        if (!b) return;
        document.getElementById('modalTitle').textContent = 'Edit Bus';
        document.getElementById('editId').value = b.id;
        document.getElementById('fBusNo').value = b.bus_no;
        document.getElementById('fCapacity').value = b.capacity;
        document.getElementById('fStatus').value = b.status;
        renderDriverOptions(b.driver_id);
        openModal('busModal');
    }

    async function saveBus() {
        const id = document.getElementById('editId').value;
        const payload = {
            bus_no: document.getElementById('fBusNo').value.trim(),
            capacity: document.getElementById('fCapacity').value,
            status: document.getElementById('fStatus').value,
            driver_id: document.getElementById('fDriver').value || null
        };
        if (!payload.bus_no) { showToast('Bus number is required', 'error'); return; }
        const res = id
            ? await apiPut(`/api/buses/${id}`, payload)
            : await apiPost('/api/buses', payload);
        if (res.ok) {
            showToast(id ? 'Bus updated!' : 'Bus added!', 'success');
            closeModal('busModal');
            load();
        } else {
            showToast(res.data.error || 'Error saving bus', 'error');
        }
    }

    async function deleteBus(id, name) {
        confirmDelete(`Delete bus ${name}?`, async () => {
            const res = await apiDelete(`/api/buses/${id}`);
            if (res.ok) { showToast('Bus deleted', 'success'); load(); }
            else showToast(res.data.error || 'Error deleting bus', 'error');
        });
    }

    load();
</script>
{% endblock %}
