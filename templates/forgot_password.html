{% extends "base.html" %}
{% block title %}Forgot Password — College Bus Management{% endblock %}

{% block auth_content %}
<img src="{{ url_for('static', filename='images/college_logo.png') }}" class="login-watermark" alt="">
<style>
    .login-watermark {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(1800px, 98vw);
        opacity: 0.14;
        pointer-events: none;
        z-index: 0;
        user-select: none;
    }

    .login-page {
        position: relative;
        z-index: 1;
    }
</style>

<div class="login-page">
    <div class="login-container">
        <div class="login-logo">
            <div class="login-logo-icon-wrap">
                <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="28" cy="28" r="28" fill="url(#fg)" />
                    <path d="M28 20v8l5 3" stroke="white" stroke-width="2.5" stroke-linecap="round" />
                    <circle cx="28" cy="28" r="12" stroke="white" stroke-width="2.2" />
                    <defs>
                        <linearGradient id="fg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#6366f1" />
                            <stop offset="1" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="login-logo-text">Forgot Password</div>
            <div class="login-logo-sub">Enter your email — we'll send a reset link</div>
        </div>

        <div class="login-card">
            <div id="msgBox" style="display:none;" class="login-error"></div>
            <div id="successBox"
                style="display:none;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#34d399;font-size:13px;padding:14px;border-radius:10px;margin-bottom:16px;text-align:center;">
            </div>

            <div id="formSection">
                <div class="login-input-group">
                    <span class="login-input-icon">📧</span>
                    <input type="email" id="resetEmail" class="login-input" placeholder="Your registered email address"
                        autocomplete="email">
                </div>
                <button class="login-btn" id="sendBtn" onclick="sendReset()">Send Reset Link</button>
            </div>

            <div style="text-align:center;margin-top:20px;">
                <a href="/login" style="font-size:13px;color:var(--accent-light);text-decoration:none;">← Back to Sign
                    In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function sendReset() {
        const btn = document.getElementById('sendBtn');
        const email = document.getElementById('resetEmail').value.trim();
        const msgBox = document.getElementById('msgBox');
        const successBox = document.getElementById('successBox');

        msgBox.style.display = 'none';
        if (!email) { msgBox.textContent = 'Please enter your email.'; msgBox.style.display = 'block'; return; }

        btn.textContent = 'Sending…'; btn.disabled = true;
        try {
            const res = await fetch('/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
            const data = await res.json();
            if (res.ok && data.success) {
                document.getElementById('formSection').style.display = 'none';
                successBox.textContent = data.message;
                successBox.style.display = 'block';
            } else {
                msgBox.textContent = data.message || 'Something went wrong.';
                msgBox.style.display = 'block';
                btn.textContent = 'Send Reset Link'; btn.disabled = false;
            }
        } catch {
            msgBox.textContent = 'Server error. Please try again.';
            msgBox.style.display = 'block';
            btn.textContent = 'Send Reset Link'; btn.disabled = false;
        }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') sendReset(); });
    document.addEventListener('DOMContentLoaded', () => document.body.classList.add('page-loaded'));
</script>
{% endblock %}
